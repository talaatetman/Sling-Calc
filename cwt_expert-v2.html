<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Counterweight Sling Expert v2.0 - إيلاف للمصاعد</title>
    <style>
        :root { --primary: #2980b9; --secondary: #2c3e50; --accent: #f39c12; --safe: #27ae60; --danger: #c0392b; --support: #d35400; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        
        .section-title { background: var(--secondary); color: white; padding: 10px 20px; border-radius: 5px; margin: 25px 0 15px 0; font-size: 1.1em; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.9em; margin-bottom: 8px; color: #444; }
        select, input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }

        .checkbox-field { flex-direction: row; align-items: center; gap: 10px; background: #fff3e0; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); }
        .checkbox-field input { width: 20px; height: 20px; cursor: pointer; }

        button.calc-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button.calc-btn:hover { background: #1f6391; }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; display: none; }
        .report-card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .report-card h3 { color: var(--secondary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: #f9f9f9; }
        
        .status-ok { color: var(--safe); font-weight: bold; }
        .status-fail { color: var(--danger); font-weight: bold; }
        .guidance-box { grid-column: 1 / -1; background: #e8f4fd; border-right: 5px solid var(--primary); padding: 15px; border-radius: 4px; font-size: 0.9em; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>نظام تصميم شاسيه الثقل المتقدم</h1>
    <div class="section-title">1. بيانات التحميل والزلزال</div>
    <div class="input-grid">
        <div class="field"><label>الوزن الكلي للثقل (كجم)</label><input type="number" id="mass" value="600"></div>
        <div class="field">
            <label>معامل براشوت الكابينه</label>
            <select id="k_factor">
                <option value="3">بكر (3)</option>
                <option value="2">تدريجي (2)</option>
                 <option value="5">لحظي (5)</option>
            </select>
        </div>
        <div class="field">
            <label>المنطقة الزلزالية</label>
            <select id="seismic_acc">
                <option value="0.1">0.1g</option>
                <option value="0.25">0.25g</option>
                <option value="0.4">0.4g</option>
            </select>
        </div>
    </div>

    <div class="section-title">2. أبعاد الشاسيه والتدعيم</div>
    <div class="input-grid">
        <div class="field"><label>طول قطعة الثقل Dx (سم)</label><input type="number" id="Dx" value="69"></div>
        <div class="field"><label>عرض قطعة الثقل Dy (سم)</label><input type="number" id="Dy" value="14"></div>
        <div class="field"><label>الطول الحر للكمر الأفقي L (سم)</label><input type="number" id="L_hor" value="70"></div>
        <div class="field"><label>ارتفاع الشاسيه H (سم)</label><input type="number" id="H_total" value="300"></div>
        <div class="field"><label>الطول الحر للكمر الرأسي Lv (سم)</label><input type="number" id="Lv_free" value="270"></div>
        <div class="field checkbox-field">
            <input type="checkbox" id="mid_support">
            <label style="margin:0; color:var(--support);">إضافة تدعيم وسطي بربط الكمرتين الرأسيتين ببعضهما من المنتصف</label>
        </div>
    </div>

    <div class="section-title">3. اختيار القطاعات</div>
    <div class="input-grid">
        <div class="field">
            <label>مقطع الكمر الأفقي</label>
            <select id="h_type" onchange="updateSizes('h')">
                <option value="Flat">صاج مفرود (بدون تكسيح)</option>
                <option value="Sheet">صاج مطوي (تكسيحة 5سم)</option>
                <option value="UPN">UPN (مجرى)</option>
            </select>
            <select id="h_size" style="margin-top:5px;"></select>
        </div>
        <div class="field">
            <label>مقطع الكمر الرأسي</label>
            <select id="v_type" onchange="updateSizes('v')">
                <option value="Sheet">صاج مطوي (تكسيحة 5سم)</option>
                <option value="UPN">UPN (مجرى)</option>
            </select>
            <select id="v_size" style="margin-top:5px;"></select>
        </div>
    </div>

    <button class="calc-btn" onclick="runCwtAnalysis()">بدء التحليل الإنشائي</button>

    <div id="report_area" class="report-grid">
        <div class="report-card">
            <h3>نتائج الكمر الأفقي</h3>
            <table>
                <thead><tr><th>الحالة</th><th>الإجهاد</th><th>الترخيم</th></tr></thead>
                <tbody id="h_body"></tbody>
            </table>
        </div>
        <div class="report-card">
            <h3>نتائج الكمر الرأسي</h3>
            <table>
                <thead><tr><th>الحالة</th><th>إجهاد مركب</th><th>النحافة λ</th></tr></thead>
                <tbody id="v_body"></tbody>
            </table>
        </div>
        <div class="guidance-box" id="advice_box"></div>
    </div>
        <p>تصميم وتطوير: طلعات عتمان - ايلاف للمصاعد - مدونة المصاعد</p>
</div>

<script>
    const db = {
        Flat: {}, // سيتم ملؤها برمجياً (صاج مفرود)
        Sheet: {
            "12_5": {Wx:22.4, Wy:7.2, Ix:134, Area:9.5, r:1.45},
            "14_6": {Wx:32.4, Wy:10.2, Ix:226, Area:11.5, r:1.65},
            "16_6": {Wx:42.1, Wy:12.5, Ix:337, Area:13.2, r:1.82}
        },
        UPN: {
            "10": {Wx:41.1, Wy:8.49, Ix:206, Area:13.5, r:1.55},
            "12": {Wx:60.7, Wy:11.1, Ix:364, Area:17.0, r:1.74},
            "14": {Wx:86.4, Wy:14.8, Ix:605, Area:20.4, r:1.94},
            "16": {Wx:116, Wy:18.3, Ix:925, Area:24.0, r:2.14}
        }
    };

    // توليد مكتبة الصاج المفرود برمجياً (تخانات 4-10 مم، مقاسات 8-22 سم)
    for(let t=4; t<=10; t+=2) {
        for(let s=8; s<=22; s+=2) {
            let area = (s * t) / 10; // cm2
            let wx = (t/10 * s * s) / 6; // cm3
            let ix = (t/10 * Math.pow(s, 3)) / 12; // cm4
            db.Flat[`${s}سم_${t}مم`] = {Wx: wx, Ix: ix, Area: area};
        }
    }

    function updateSizes(pos) {
        const type = document.getElementById(pos + '_type').value;
        const sel = document.getElementById(pos + '_size');
        sel.innerHTML = '';
        Object.keys(db[type]).forEach(s => {
            let o = document.createElement('option'); o.value = s; o.innerText = s.replace('_',' '); sel.appendChild(o);
        });
    }

    function runCwtAnalysis() {
        const mass = parseFloat(document.getElementById('mass').value);
        const tk_base = parseFloat(document.getElementById('k_factor').value);
        const ah = parseFloat(document.getElementById('seismic_acc').value);
        const Lh = parseFloat(document.getElementById('L_hor').value) * 10;
        const Lv_orig = parseFloat(document.getElementById('Lv_free').value) * 10;
        const Dx = parseFloat(document.getElementById('Dx').value) * 10;
        const Dy = parseFloat(document.getElementById('Dy').value) * 10;
        const H = parseFloat(document.getElementById('H_total').value) * 10;
        const isSupported = document.getElementById('mid_support').checked;

        // التدعيم الوسطي يقسم الطول الحر للنحافة على 2
        const Lv_slender = isSupported ? (Lv_orig / 2) : Lv_orig;

        const h_data = db[document.getElementById('h_type').value][document.getElementById('h_size').value];
        const v_data = db[document.getElementById('v_type').value][document.getElementById('v_size').value];

        let h_html = "", v_html = "";
        let cases = [
            {n: "طبيعي", k: 1.2, s: 0},
            {n: "براشوت", k: tk_base, s: 0},
            {n: "زلزال", k: 1.0, s: ah},
            {n: "مركب", k: tk_base * 0.6, s: ah}
        ];

        cases.forEach(c => {
            const tk = c.k + c.s;
            // أفقي (معامل 8)
            const h_sigma = (mass * 9.81 * tk * Lh) / (8 * h_data.Wx * 1000);
            const h_defl = (0.7 * (mass * 9.81 * tk / 4) * Math.pow(Lh, 3)) / (48 * 210000 * h_data.Ix * 10000);
            h_html += `<tr><td>${c.n}</td><td class="${h_sigma>130?'status-fail':''}">${h_sigma.toFixed(1)}</td><td>${h_defl.toFixed(2)}</td></tr>`;

            // رأسي
            const Mx = (mass * 9.81 * tk * (0.1*Dx) * Lv_orig) / (2 * H);
            const My = (mass * 9.81 * tk * (0.05*Dy) * Lv_orig) / (2 * H);
            const v_sigma = (Mx/(v_data.Wx*1000)) + (My/(v_data.Wy*1000)) + (mass*9.81*tk)/(2*v_data.Area*100);
            const lambda = Lv_slender / (v_data.r * 10);
            v_html += `<tr><td>${c.n}</td><td class="${v_sigma>130?'status-fail':''}">${v_sigma.toFixed(1)}</td><td class="${lambda>120?'status-fail':''}">${lambda.toFixed(1)}</td></tr>`;
        });

        document.getElementById('h_body').innerHTML = h_html;
        document.getElementById('v_body').innerHTML = v_html;
        document.getElementById('report_area').style.display = 'grid';
        document.getElementById('advice_box').innerHTML = `<b>عند ظهور قيم باللون الاحمر كبر الصاج او الكمرة 2 سم</b><br>• حدود الأمان: الإجهاد < 130 N/mm²، النحافة < 120، الترخيم < 0.001 من الطول.<br><b>توجيه ذكى:</b> ${isSupported ? 'تم تفعيل التدعيم الوسطي، مما قلل طول النحافة الفعال بنسبة 50%.' : 'الكمر الرأسى بدون تدعيم وسطي، راقب قيم النحافة λ جيداً.'}`;
    }

    window.onload = () => { updateSizes('h'); updateSizes('v'); };
</script>
</body>
</html>
